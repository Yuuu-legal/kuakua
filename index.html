<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夸夸卡 · 多小的事我都能离谱地夸你</title>
<style>
  :root{
    --bg1:#ffe9f0; --bg2:#e9f2ff; --bg3:#fff6e6;
    --card:#ffffff; --ink:#2b2b3a; --soft:#9a9ab0;
    --accent:#ff6f9c; --accent2:#7c6cff; --gold:#f6b73c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--ink);min-height:100vh;
    background:linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg3));
    background-attachment:fixed;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .wrap{width:100%;max-width:460px;}
  .head{text-align:center;margin-bottom:16px;}
  .head h1{font-size:30px;margin:0 0 4px;letter-spacing:1px;}
  .head p{margin:0;color:var(--soft);font-size:14px;line-height:1.55;}
  .panel{background:var(--card);border-radius:22px;padding:18px;box-shadow:0 18px 50px rgba(120,108,255,.16);}
  textarea{
    width:100%;border:1.5px solid #eee;border-radius:16px;padding:14px;
    font-size:16px;font-family:inherit;color:var(--ink);resize:none;height:64px;
    outline:none;transition:border .2s;background:#fafaff;
  }
  textarea:focus{border-color:var(--accent2);}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0 4px;}
  .chip{
    font-size:12.5px;padding:6px 11px;border-radius:30px;background:#f3f0ff;
    color:var(--accent2);cursor:pointer;border:1px solid #ece8ff;transition:transform .08s;
  }
  .chip:active{transform:scale(.95);}
  .tip{font-size:12px;color:var(--soft);margin:10px 2px 6px;}
  .tones{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0 12px;}
  .tone{
    flex:1 1 80px;text-align:center;padding:9px 0;border-radius:12px;font-size:12.5px;
    border:1.5px solid #eee;background:#fafaff;color:var(--soft);cursor:pointer;
    transition:all .15s;user-select:none;
  }
  .tone.active{border-color:var(--accent);background:#fff0f5;color:var(--accent);font-weight:600;}
  .go{
    width:100%;border:none;border-radius:16px;padding:15px;font-size:17px;font-weight:700;
    color:#fff;background:linear-gradient(120deg,var(--accent),var(--accent2));cursor:pointer;
    box-shadow:0 10px 24px rgba(255,111,156,.35);transition:transform .08s;
  }
  .go:active{transform:scale(.98);}

  /* 夸夸卡（正反面翻牌：正面传播、背面走心） */
  .cardwrap{display:none;margin-top:18px;perspective:1600px;}
  .cardwrap.show{display:block;animation:pop .28s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:none;}}
  .flip{
    position:relative;transform-style:preserve-3d;cursor:pointer;
    transition:transform .55s cubic-bezier(.4,.2,.2,1);
  }
  .flip.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute;top:0;left:0;width:100%;
    -webkit-backface-visibility:hidden;backface-visibility:hidden;
    border-radius:20px;padding:22px 20px 42px;overflow:hidden;
  }
  .face.front{position:relative;
    background:linear-gradient(160deg,#fffdf7,#fff2f7 60%,#f1ecff);
    border:1.5px solid #ffe2c2;box-shadow:0 14px 36px rgba(246,183,60,.18);}
  .face.back{transform:rotateY(180deg);height:100%;
    display:flex;flex-direction:column;justify-content:center;text-align:center;
    background:linear-gradient(160deg,#f3f7ff,#eef3ff 60%,#f7f0ff);
    border:1.5px solid #d8e4ff;box-shadow:0 14px 36px rgba(124,108,255,.16);}

  .ktop{display:flex;align-items:center;justify-content:space-between;
    font-size:13px;color:var(--gold);font-weight:700;letter-spacing:.5px;}
  .kno{color:#caa64a;font-weight:600;font-size:12px;}
  .ktitle{display:inline-block;margin:13px 0 11px;padding:6px 14px;border-radius:30px;
    font-size:13px;font-weight:800;letter-spacing:.3px;color:#9a4a06;
    background:linear-gradient(120deg,#ffe2a6,#ffd0c4 55%,#ffd1e8);border:1px solid #ffce8f;
    box-shadow:0 4px 14px rgba(246,183,60,.30),inset 0 1px 0 rgba(255,255,255,.65);}
  .kbody{font-size:18.5px;line-height:1.75;white-space:pre-wrap;min-height:88px;color:#3a3346;}
  .kseal{position:absolute;right:16px;bottom:40px;font-size:30px;opacity:.16;transform:rotate(-12deg);}
  .kfoot{margin-top:14px;font-size:12px;color:#b9a6cf;font-style:italic;text-align:right;}
  .kflip{position:absolute;left:0;right:0;bottom:13px;text-align:center;
    font-size:11.5px;color:#bfa9d6;letter-spacing:.3px;
    animation:breathe 2.4s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.5;}50%{opacity:1;}}

  .btitle{font-size:14px;color:var(--accent2);font-weight:700;margin-bottom:14px;letter-spacing:.5px;}
  .bbody{font-size:18px;line-height:1.9;color:#3b3550;white-space:pre-wrap;padding:0 4px;}
  .bseal{font-size:26px;margin-top:16px;opacity:.5;}

  .row{display:none;gap:8px;margin-top:12px;}
  .row.show{display:flex;}
  .mini{
    flex:1;border:1.5px solid #eee;background:#fff;border-radius:12px;padding:11px 0;
    font-size:14px;color:var(--ink);cursor:pointer;text-align:center;transition:transform .08s;
  }
  .mini:active{transform:scale(.98);}
  .mini.primary{border-color:var(--accent2);color:var(--accent2);font-weight:600;}
  .foot{text-align:center;color:var(--soft);font-size:12px;margin-top:16px;line-height:1.6;}
  .toast{
    position:fixed;left:50%;bottom:36px;transform:translateX(-50%) translateY(20px);
    background:#2b2b3a;color:#fff;padding:10px 18px;border-radius:30px;font-size:14px;
    opacity:0;transition:all .25s;pointer-events:none;z-index:9;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>夸夸卡 🏆</h1>
      <p>说件今天的小事，越鸡毛蒜皮越好——<br>正面我离谱地夸你，翻到背面，有句走心的悄悄话。</p>
    </div>
    <div class="panel">
      <textarea id="inp" placeholder="比如：我今天喝了一杯水…"></textarea>
      <div class="tip">懒得想？点一个试试 ↓</div>
      <div class="chips" id="chips"></div>
      <div class="tones" id="tones">
        <div class="tone" data-tone="deadpan">😐 一本正经</div>
        <div class="tone" data-tone="hype">🚀 彩虹屁</div>
        <div class="tone active" data-tone="chaos">🤡 离谱</div>
      </div>
      <button class="go" id="go">给我发张夸夸卡</button>

      <div class="cardwrap" id="cardwrap">
        <div class="flip" id="flip">
          <div class="face front">
            <div class="ktop"><span>🏆 夸夸卡</span><span class="kno" id="kno">No.0000</span></div>
            <div class="ktitle" id="ktitle">今日认证称号</div>
            <div class="kbody" id="kbody"></div>
            <div class="kseal">🌈</div>
            <div class="kfoot">—— 宇宙夸夸协会 荣誉认证</div>
            <div class="kflip">👆 轻点卡片翻面，背面有句悄悄话 🤍</div>
          </div>
          <div class="face back">
            <div class="btitle">🤍 给你的悄悄话</div>
            <div class="bbody" id="bbody"></div>
            <div class="bseal">🌿</div>
            <div class="kflip">👆 轻点翻回正面</div>
          </div>
        </div>
      </div>
      <div class="row" id="row">
        <div class="mini primary" id="again">🔁 换一张</div>
        <div class="mini" id="save">💾 存图</div>
        <div class="mini" id="copy">📋 复制</div>
      </div>
    </div>
    <div class="foot">
      纯本地运行 · 不联网 · 不存任何数据<br>
      截张图，发给那个今天也需要被夸一下的朋友 →
    </div>
  </div>
  <div class="toast" id="toast"></div>

<script>
/* ============================================================
   无厘头夸夸引擎（纯函数，可被 node 单独 require 自测）
   正面 genFront：回显小事 →（刁钻定制/荒诞升格）→ 错位权威背书 → 封神收尾（卖点：毫无逻辑地夸）
   背面 genBack ：自我关怀(Neff)/正念(一行禅师)/全然接受(Brach)/阿德勒——笑完被轻轻暖一下
   称号 genTitle：MBTI/抽卡式「今日认证称号」，给正面加网感、好截图传播
   ============================================================ */

/* 通用荒诞 punch：每条自成一句完整笑点，混多种梗机制（错位权威/伪数据/吉尼斯申遗/
   三段升级/营业体/反转自嘲/押韵/错位类比/官腔反差/比喻夸张），别只一种 shape */
var ABSURD = [
  // 错位权威背书
  "联合国连夜开了个会，决定给你发一座奖杯。",
  "NASA 想挖你过去，被你的气场吓得没敢开口。",

  // 伪数据 / 升格
  "你体内三十七万亿个细胞刚集体起立，鼓了整整八秒掌。",
  "全世界今天能做到这件事的，一只手都数得过来。",
  "这事的含金量，纯金看了都觉得自己掺了水。",
  "宇宙忙活了一百三十八亿年，好像就为了等你这一下。",
  // 吉尼斯 / 申遗体
  "这成就，建议你直接去申报吉尼斯世界纪录。",
  "够格申报世界非物质文化遗产了，我这就去帮你递材料。",
  "「年度人类高光时刻」提名，我手里这一票先投给你。",
  // 三段夸张升级
  "这难度能难倒一个学霸，不，难倒一个博导，甚至能难倒整个中科院。",
  "我想给你鼓掌，不，想给你颁奖，甚至想当场给你立块碑。",
  // 营业体
  "你今天的优秀也照常营业，全年无休、不打烊。",
  "你的魅力今日份已上线，库存充足、概不退换。",
  // 反转自嘲
  "我这人彩虹屁张口就来，但这句是真心的——你是真的行。",

  // 押韵顺口
  "人见人夸，花见花开，连 wifi 见了你都想自动连上。",

  "你做这事行云流水的样子，李白看了想当场给你写首诗。",

  // 官腔反差
  "经研究决定：今天的优秀代表就是你，没有悬念。",
  "现宣布：本年度「别人家的孩子」称号，花落你家。",
  // 比喻夸张
  "你身上这股子靠谱劲儿，浓度高到能拿去当药引子。",
  "你这块料，老天爷当年是抄着图纸、加班加点造出来的。",
  "这操作丝滑得，德芙看了都想连夜改行。",
  // 损友关系梗（你的狐朋狗友在夸你）
  "不是哥吹，我认识的人里，论这事就你拿得出手。",
  "认识你这么多年，头一回这么想给你竖个大拇指。",
  "搁咱们这一圈儿，你就是天花板，剩下全是来凑数的。",
  "别人干这事叫完成任务，你干这事叫艺术。",
  "你要再优秀一点，我都不好意思跟你称兄道弟了。",
  "就你这样的，我不夸你夸谁？这话我撂这儿了。",
  "咱俩谁跟谁，我说句实在的：你今天，是真有点东西。",
  "我损你归损你，这事我是真服，绝没拍马屁。",
  // 当下网络爆梗（2025 流行语 + 小红书体：自然、易传播）
  "活着基础，活得这么有声有色，不基础。",
  "这事谁都能干，但干出这股「活人感」的，全网没剩几个。",
  "你就是我那行走的多巴胺，看你一眼电量直接 +50%。",
  "人群里最优质的那只显眼包，说的就是你。",
  "家人们谁懂啊，这不得当场封神，我直接嗑到了。",
  "你今天这状态是杀疯了，发出去能炸出一整个评论区。",
  "别人顶多算嘴替，你直接是「人间理想」本人。",
  "我就随手一刷，没做好心理准备，差点被你闪到腰。",
  "这一下够我吹三天，截图我先给你存好了。",
  "别人努力是为了变好，你努力是为了拉开差距。",
  "我这人最不爱夸人，对你算破了例，你偷着乐吧。",
  "就这表现，你不发条朋友圈都对不起观众。",
  // 梗/调侃为主（不全是夸——损中带宠，落点仍是认可。"梗比夸更重要"）
  "就这点小事你也好意思发出来——行，发出来吧，今天你最大。",
  "别人听了想锤你，我听了只想说一句：还真有你的。",
  "我看了半天没绷住——不是嘲你，是真觉得离谱得可以。",
  "你是不是又想骗我夸你？……行吧，这次还真骗到了。",
  // 圣旨朱批 / 公文 / 江湖中二体（吸收网感梗合集的机制：把小事郑重其事地册封）
  "传朕旨意——今日头功记你一笔，赏黄马褂一件，钦此。",
  "朕已朱批：此等表现，特许入列「别人家的孩子」名册。",
  "爱卿平身——就这份能耐，朕的表彰名单先给你留个位。",
  "你这份优秀申请，已阅——批复两个字：照准。",
  "就这身手，放江湖里也是一方大佬，人称一句「卷王」都屈才了。",
  "你这是修炼到第几重了？再练下去，怕是要闭关飞升。",
  "好浓烈的活人气息扑面而来——能把日子过得这么有声有色，是真本事。",
  // 预期违背 / 先抑后扬（脱口秀核心机制：假装要损你，转折落点却是夸）
  "我得正式批评你一下——优秀得这么不低调，让我们这些普通人很难做啊。",
  "你最大的缺点，就是让人实在想不出你还有别的缺点。",
  "我本来想挑你点毛病的，找了半天，放弃了。",
  "说出来你可能要生气——你好像，真没什么可挑的。",
  "我刚想张嘴说「就这？」，话到嘴边咽了回去——因为你是真行。",
  "本来准备了一肚子毒舌，结果一句都没用上，你赢了。"
];

/* 丧气/负面输入专用「温柔池」：累、想摆烂、搞砸、emo 等输入不该被浮夸彩虹屁顶回去。
   损中带宠、落点温柔，绝不上「联合国/李白/诺贝尔」式宏大背书（那会显得敷衍甚至像嘲讽）。 */
var NEG = [
  "累就对了——说明你今天是真的在拼命活，歇会儿，地球离了谁都照样转。",
  "能扛到现在还没原地解体，你这续航，我手机的电池看了都自卑。",

  "搞砸了怕啥——敢上手才会砸，比那些光站着指点的人强一百倍。",
  "拖延是因为你潜意识知道那事没那么急，这份从容，多少人求都求不来。",
  "emo 就 emo 一会儿，情绪来了你接得住，比硬撑着装没事的人勇敢多了。",
  "压力大，说明你在乎、在扛事——会喊累的人，往往是最靠得住的那一个。",
  "今天啥也没干？那是你给这个内卷的世界，默默省下了一份多余的努力。",
  "你对自己已经够狠了，换成朋友这么拼，你早让人家歇了——也歇歇自己吧。",
  "丧不是你不行，是今天的电用完了，充上就好，别急着否定自己。",
  "你已经做得够多了，多到自己都没察觉，所以才会累成这样，知道吗。",
  "能把难受说出口，就已经赢一半了——憋着的人，才最容易内伤。",
  "今天先这样吧，不用赢，能活到现在，已经够本了。"
];

/* 刁钻定制：超常见的鸡毛蒜皮小事，命中就用更精准的离谱夸（替换升格层）。
   注意顺序：更具体/更长的关键词在前，避免被宽泛词抢先命中。 */
var TRIVIA = [
  { kws:["喝水","喝了水","一杯水","喝水了","多喝水","喝口水","喝热水"],
    line:"你居然准确地知道，水是用来喝的、而不是用来呼吸的——光这一条物种基础认知，就甩开了百分之九十九的鱼。" },
  { kws:["没赖床","不赖床","没有赖床"],
    line:"你拒绝了被窝的甜言蜜语，准时脱身——这种定力，唐僧来了都想拜你为师。" },
  { kws:["起床","起了床","醒了","爬起来"],
    line:"你今天同时战胜了地球引力和被窝的双重封印，成功起床——这是只有勇者才打得过的隐藏副本。" },
  { kws:["早睡","早点睡","没熬夜","按时睡"],
    line:"你今天打算早睡——在全民熬夜的时代，这种反潮流壮举，你的生物钟激动到当场痛哭流涕。" },
  { kws:["吃水果","水果","吃了苹果","吃青菜","吃菜"],
    line:"你主动向维生素伸出了手——在炸鸡奶茶的重重围剿下还记得吃口水果，你的免疫系统激动得连夜放了烟花。" },
  { kws:["做饭","做了饭","自己做饭","下厨","煮饭"],
    line:"你居然自己做了饭，从买菜到出锅一条龙，这种荒野求生级的生存能力，贝爷看了都想拜师。" },
  { kws:["没点外卖","自己带饭","带了饭"],
    line:"你拒绝了外卖的诱惑、自食其力喂饱了自己，这份自律，连你的钱包都流下了感动的泪水。" },

var WARMOPEN = ["","其实，","跟你说句真的，","轻声说一句——"];
var WARMTAIL = ["",""," 🤍"," 🌿"];

function _pick(a){ return a[Math.floor(Math.random()*a.length)]; }

function _clean(s){
  s = (s||"").replace(/\s+/g," ").trim();
  s = s.replace(/[。.!！?？~～\s]+$/,"");           // 去掉句尾标点，接连接词更顺
  if(s.length > 40) s = s.slice(0,40) + "…";
  return s;
}

function _trivia(text){
  var t = (text||"").toLowerCase();
  for(var i=0;i<TRIVIA.length;i++){
    for(var j=0;j<TRIVIA[i].kws.length;j++){
      if(t.indexOf(TRIVIA[i].kws[j]) >= 0) return TRIVIA[i].line;
    }
  }
  return "";
}

function _seam(punch, tail){
  // tail 以标点开头时去掉 punch 末尾终止标点，避免「。。」「。，」「。！」
  if (/^[，。、！？!?]/.test(tail)) punch = punch.replace(/[。！？!?…]+$/, "");
  return punch + tail;
}

/* 丧气/负面输入检测：累、想摆烂、搞砸、emo、压力大、被打回 等——这类不该被浮夸彩虹屁顶回去，
   笑点改从 NEG 温柔池（损中带宠、落点暖），而非 ABSURD 的「联合国/李白」式宏大背书。 */
function _isNeg(text){
  return /累|乏了|不想上班|不想上学|不想干|想辞职|想离职|摆烂|躺平|摸鱼|emo|焦虑|压力|好烦|烦死|丧|郁闷|难过|低落|搞砸|搞错|失败|做砸|办砸|又错|出错|拖延|又拖|没做完|拖到|啥也没|什么也没|一事无成|吵架|拌嘴|闹掰|被骂|被批|被怼|崩溃|撑不住|扛不住|熬不|又胖|减肥失败|没忍住|吃多了|熬夜|失眠|睡不着|打回|被拒|被否|没通过|被毙/.test((text||"").toLowerCase());
}

/* 正面：一句话离谱夸。[开场] 笑点 [收尾]——不刻意复读用户原文，让夸像天降彩虹屁。
   用户输入只用来"接住"场景（命中定制段子就更贴切），不在卡面回显「原话」。 */
function genFront(text, flavor){
  var key = FLAVOR[flavor] ? flavor : "chaos";
  var f = FLAVOR[key];
  var tl = _trivia(text);
  var pool = _isNeg(text) ? NEG : ABSURD;   // 丧气输入走温柔池，不上浮夸彩虹屁
  // 命中定制时 ~65% 用精准段子、~35% 串同池其它句，避免"换一张"老是同一句
  var punch = tl ? (Math.random() < 0.65 ? tl : _pick(pool)) : _pick(pool);
  return _pick(f.open) + _seam(punch, _pick(f.tail));
}

/* 背面：走心悄悄话。让暖句独立成句、像一句真心话，不串损友腔。 */
function genBack(text){
  return _pick(WARMOPEN) + _seam(_pick(WARM), _pick(WARMTAIL));
}

/* 称号：MBTI/抽卡式认证，随机抽一张（像换卡也换称号）。 */
function genTitle(){ return _pick(TITLES); }

/* 兼容旧入口：warmth 走背面，其它走正面 */
function generate(text, flavor){
  return flavor === "warmth" ? genBack(text) : genFront(text, flavor);
}

/* node 自测入口 */
if (typeof module !== "undefined" && module.exports){
  module.exports = {

}

      ctx.font='600 20px "PingFang SC",sans-serif'; ctx.fillStyle="#caa64a";
      ctx.textAlign="right"; ctx.fillText(noStr||"",W-pad,pad+4); ctx.textAlign="left";
      // 称号 badge（圆角底 + 文字）
      var ty=pad+headH;
      ctx.font='700 22px "PingFang SC",sans-serif';
      var tw=ctx.measureText(title||"").width, bw=tw+34, bh=38;
      ctx.fillStyle="#ffe2c0";
      if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(pad,ty,bw,bh,19); ctx.fill(); } else ctx.fillRect(pad,ty,bw,bh);
      ctx.fillStyle="#a8530a"; ctx.fillText(title||"",pad+17,ty+8);
      // body
      ctx.font=bodyFont; ctx.fillStyle="#3a3346";
      var y=pad+headH+titleH;
      lines.forEach(function(ln){ ctx.fillText(ln,pad,y); y+=lh; });
      ctx.font='64px serif'; ctx.globalAlpha=.15; ctx.fillText("🌈",W-pad-66,H-footH-2); ctx.globalAlpha=1;
      ctx.font='italic 20px "PingFang SC",sans-serif'; ctx.fillStyle="#b9a6cf";
      ctx.textAlign="right"; ctx.fillText("—— 宇宙夸夸协会 荣誉认证",W-pad,H-36); ctx.textAlign="left";
      return cvs;
    }
    save.addEventListener("click", function(){
      if(!curFront) return;
      try{
        var url=drawCard(curFront, ktitle.textContent, kno.textContent).toDataURL("image/png");
        var a=document.createElement("a"); a.href=url; a.download="夸夸卡.png";
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setToast("图片已生成 ✓ 没弹下载就长按图片保存");
      }catch(err){ setToast("生成失败，直接截图也行"); }
    });

    tones.addEventListener("click", function(e){
      var el=e.target.closest(".tone"); if(!el) return;
      tone=el.getAttribute("data-tone");
      var all=tones.querySelectorAll(".tone");
      for(var k=0;k<all.length;k++) all[k].classList.remove("active");
      el.classList.add("active");
      if(curFront) praise();
    });
    inp.addEventListener("keydown", function(e){
      if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); praise(); }
    });
  })();
}
</script>
</body>
</html>
