<title>夸夸卡 · 多小的事我都能离谱地夸你</title>
<style>
  :root{
    --bg1:#ffe9f0; --bg2:#e9f2ff; --bg3:#fff6e6;
    --card:#ffffff; --ink:#2b2b3a; --soft:#9a9ab0;
    --accent:#ff6f9c; --accent2:#7c6cff; --gold:#f6b73c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--ink);min-height:100vh;
    background:linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg3));
    background-attachment:fixed;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .wrap{width:100%;max-width:460px;}
  .head{text-align:center;margin-bottom:16px;}
  .head h1{font-size:30px;margin:0 0 4px;letter-spacing:1px;}
  .head p{margin:0;color:var(--soft);font-size:14px;line-height:1.55;}
  .panel{background:var(--card);border-radius:22px;padding:18px;box-shadow:0 18px 50px rgba(120,108,255,.16);}
  textarea{
    width:100%;border:1.5px solid #eee;border-radius:16px;padding:14px;
    font-size:16px;font-family:inherit;color:var(--ink);resize:none;height:64px;
    outline:none;transition:border .2s;background:#fafaff;
  }
  textarea:focus{border-color:var(--accent2);}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0 4px;}
  .chip{
    font-size:12.5px;padding:6px 11px;border-radius:30px;background:#f3f0ff;
    color:var(--accent2);cursor:pointer;border:1px solid #ece8ff;transition:transform .08s;
  }
  .chip:active{transform:scale(.95);}
  .tip{font-size:12px;color:var(--soft);margin:10px 2px 6px;}
  .tones{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0 12px;}
  .tone{
    flex:1 1 80px;text-align:center;padding:9px 0;border-radius:12px;font-size:12.5px;
    border:1.5px solid #eee;background:#fafaff;color:var(--soft);cursor:pointer;
    transition:all .15s;user-select:none;
  }
  .tone.active{border-color:var(--accent);background:#fff0f5;color:var(--accent);font-weight:600;}
  .go{
    width:100%;border:none;border-radius:16px;padding:15px;font-size:17px;font-weight:700;

    box-shadow:0 10px 24px rgba(255,111,156,.35);transition:transform .08s;
  }
  .go:active{transform:scale(.98);}

  /* 夸夸卡（正反面翻牌：正面传播、背面走心） */
  .cardwrap{display:none;margin-top:18px;perspective:1600px;}
  .cardwrap.show{display:block;animation:pop .28s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:none;}}
  .flip{
    position:relative;transform-style:preserve-3d;cursor:pointer;
    transition:transform .55s cubic-bezier(.4,.2,.2,1);
  }
  .flip.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute;top:0;left:0;width:100%;
    -webkit-backface-visibility:hidden;backface-visibility:hidden;
    border-radius:20px;padding:22px 20px 42px;overflow:hidden;
  }
  .face.front{position:relative;
    background:linear-gradient(160deg,#fffdf7,#fff2f7 60%,#f1ecff);
    border:1.5px solid #ffe2c2;box-shadow:0 14px 36px rgba(246,183,60,.18);}
  .face.back{transform:rotateY(180deg);height:100%;
    display:flex;flex-direction:column;justify-content:center;text-align:center;
    background:linear-gradient(160deg,#f3f7ff,#eef3ff 60%,#f7f0ff);
    border:1.5px solid #d8e4ff;box-shadow:0 14px 36px rgba(124,108,255,.16);}

  .ktop{display:flex;align-items:center;justify-content:space-between;
    font-size:13px;color:var(--gold);font-weight:700;letter-spacing:.5px;}
  .kno{color:#caa64a;font-weight:600;font-size:12px;}
  .ktitle{display:inline-block;margin:13px 0 11px;padding:6px 14px;border-radius:30px;

    background:linear-gradient(120deg,#ffe2a6,#ffd0c4 55%,#ffd1e8);border:1px solid #ffce8f;

  .kbody{font-size:18.5px;line-height:1.75;white-space:pre-wrap;min-height:88px;color:#3a3346;}
  .kseal{position:absolute;right:16px;bottom:40px;font-size:30px;opacity:.16;transform:rotate(-12deg);}
  .kfoot{margin-top:14px;font-size:12px;color:#b9a6cf;font-style:italic;text-align:right;}
  .kflip{position:absolute;left:0;right:0;bottom:13px;text-align:center;
    font-size:11.5px;color:#bfa9d6;letter-spacing:.3px;
    animation:breathe 2.4s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.5;}50%{opacity:1;}}

  .btitle{font-size:14px;color:var(--accent2);font-weight:700;margin-bottom:14px;letter-spacing:.5px;}
  .bbody{font-size:18px;line-height:1.9;color:#3b3550;white-space:pre-wrap;padding:0 4px;}
  .bseal{font-size:26px;margin-top:16px;opacity:.5;}

  .row{display:none;gap:8px;margin-top:12px;}
  .row.show{display:flex;}
  .mini{
    flex:1;border:1.5px solid #eee;background:#fff;border-radius:12px;padding:11px 0;
    font-size:14px;color:var(--ink);cursor:pointer;text-align:center;transition:transform .08s;
  }
  .mini:active{transform:scale(.98);}
  .mini.primary{border-color:var(--accent2);color:var(--accent2);font-weight:600;}
  .foot{text-align:center;color:var(--soft);font-size:12px;margin-top:16px;line-height:1.6;}
  .toast{
    position:fixed;left:50%;bottom:36px;transform:translateX(-50%) translateY(20px);
    background:#2b2b3a;color:#fff;padding:10px 18px;border-radius:30px;font-size:14px;
    opacity:0;transition:all .25s;pointer-events:none;z-index:9;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>夸夸卡 🏆</h1>
      <p>说件今天的小事，越鸡毛蒜皮、越丧越好——<br>正面我变着花儿地夸你逗你，翻到背面，跟你说句掏心窝的。</p>
    </div>
    <div class="panel">
      <textarea id="inp" placeholder="比如：我今天喝了一杯水…"></textarea>

        </div>

        <div class="mini primary" id="again">🔁 换一张</div>
        <div class="mini" id="save">💾 存图</div>
        <div class="mini" id="copy">📋 复制</div>
      </div>
    </div>
    <div class="foot">
      笑容是青春的解药 ✨<br>
      截张图，发给那个今天也需要乐一下的朋友 →<br>
      纯本地运行 · 不联网 · 不存任何数据
    </div>
  </div>
  <div class="toast" id="toast"></div>

<script>
/* ============================================================
   无厘头夸夸引擎（纯函数，可被 node 单独 require 自测）
   正面 genFront：四层「接住你的话」对症夸 —— ⓪ 活人感层(_soul：抓句式标记 才/又/还是/是不是 + 具体内容,
                  接住言外之意再回应,最像真人,优先) ① SCENE(身份/处境) ② TRIVIA(动作小事) ③ 通用池(ABSURD 爆梗/NEG 温柔)。
                  核心是「在听你说话」不是抽签；剖开输入的一个点夸,不回显原文。
   背面 genBack ：损友半夜掏心窝 + reframe(课题分离/成长型/暂时性)——笑完被轻轻暖一下、并被轻轻点醒一下
   称号 genTitle：MBTI/抽卡式「今日认证称号」，给正面加网感、好截图传播
   ============================================================ */

/* 通用荒诞 punch：每条自成一句完整笑点，混多种梗机制（错位权威/伪数据/吉尼斯申遗/
   三段升级/营业体/反转自嘲/押韵/错位类比/官腔反差/比喻夸张），别只一种 shape */
var ABSURD = [
  // 错位权威背书
  "联合国连夜开了个会，决定给你发一座奖杯。",
  "NASA 想挖你过去，被你的气场吓得没敢开口。",
  "诺贝尔委员会表示，对应的奖项他们还没来得及设。",
  "你家楼下的保安听说后，主动给你敬了个礼。",
  "今晚月亮格外亮，那是它在偷偷给你打光。",
  "隔壁村的王大爷都听说了，直呼后生可畏。",
  "连一向高冷的猫，今天都愿意多看你两眼。",
  "热搜本来想给你留个位置，怕你嫌吵才作罢。",
  // 伪数据 / 升格
  "你体内三十七万亿个细胞刚集体起立，鼓了整整八秒掌。",
  "全世界今天能做到这件事的，一只手都数得过来。",
  "这事的含金量，纯金看了都觉得自己掺了水。",
  "宇宙忙活了一百三十八亿年，好像就为了等你这一下。",
  // 吉尼斯 / 申遗体
  "这成就，建议你直接去申报吉尼斯世界纪录。",
  "够格申报世界非物质文化遗产了，我这就去帮你递材料。",
  "「年度人类高光时刻」提名，我手里这一票先投给你。",
  // 三段夸张升级
  "这难度能难倒一个学霸，不，难倒一个博导，甚至能难倒整个中科院。",
  "我想给你鼓掌，不，想给你颁奖，甚至想当场给你立块碑。",
  // 营业体
  "你今天的优秀也照常营业，全年无休、不打烊。",
  "你的魅力今日份已上线，库存充足、概不退换。",
  // 反转自嘲
  "我这人彩虹屁张口就来，但这句是真心的——你是真的行。",
  "我夸过的人能绕地球一圈，你是头一个把我夸到词穷的。",
  // 押韵顺口
  "人见人夸，花见花开，连 wifi 见了你都想自动连上。",
  "上天太偏心了，把好东西一股脑全塞给了你一个人。",
  // 错位类比
  "你做这事行云流水的样子，李白看了想当场给你写首诗。",
  "这份专注，米开朗基罗当年凿大卫，也就这个水平。",
  // 官腔反差
  "经研究决定：今天的优秀代表就是你，没有悬念。",
  "现宣布：本年度「别人家的孩子」称号，花落你家。",
  // 比喻夸张
  "你身上这股子靠谱劲儿，浓度高到能拿去当药引子。",
  "你这块料，老天爷当年是抄着图纸、加班加点造出来的。",
  "这操作丝滑得，德芙看了都想连夜改行。",
  // 损友关系梗（你的狐朋狗友在夸你）
  "不是哥吹，我认识的人里，论这事就你拿得出手。",
  "认识你这么多年，头一回这么想给你竖个大拇指。",
  "搁咱们这一圈儿，你就是天花板，剩下全是来凑数的。",
  "别人干这事叫完成任务，你干这事叫艺术。",
  "你要再优秀一点，我都不好意思跟你称兄道弟了。",
  "就你这样的，我不夸你夸谁？这话我撂这儿了。",
  "咱俩谁跟谁，我说句实在的：你今天，是真有点东西。",
  "我损你归损你，这事我是真服，绝没拍马屁。",
  // 当下网络爆梗（2025 流行语 + 小红书体：自然、易传播）
  "活着基础，活得这么有声有色，不基础。",
  "这事谁都能干，但干出这股「活人感」的，全网没剩几个。",
  "你就是我那行走的多巴胺，看你一眼电量直接 +50%。",
  "人群里最优质的那只显眼包，说的就是你。",
  "家人们谁懂啊，这不得当场封神，我直接嗑到了。",
  "你今天这状态是杀疯了，发出去能炸出一整个评论区。",
  "别人顶多算嘴替，你直接是「人间理想」本人。",
  "我就随手一刷，没做好心理准备，差点被你闪到腰。",
  "这一下够我吹三天，截图我先给你存好了。",
  "别人努力是为了变好，你努力是为了拉开差距。",
  "我这人最不爱夸人，对你算破了例，你偷着乐吧。",
  "就这表现，你不发条朋友圈都对不起观众。",
  // 梗/调侃为主（不全是夸——损中带宠，落点仍是认可。"梗比夸更重要"）
  "就这点小事你也好意思发出来——行，发出来吧，今天你最大。",
  "别人听了想锤你，我听了只想说一句：还真有你的。",
  "我看了半天没绷住——不是嘲你，是真觉得离谱得可以。",
  "你是不是又想骗我夸你？……行吧，这次还真骗到了。",
  // 圣旨朱批 / 公文 / 江湖中二体（吸收网感梗合集的机制：把小事郑重其事地册封）
  "传朕旨意——今日头功记你一笔，赏黄马褂一件，钦此。",
  "朕已朱批：此等表现，特许入列「别人家的孩子」名册。",
  "爱卿平身——就这份能耐，朕的表彰名单先给你留个位。",
  "你这份优秀申请，已阅——批复两个字：照准。",
  "就这身手，放江湖里也是一方大佬，人称一句「卷王」都屈才了。",
  "你这是修炼到第几重了？再练下去，怕是要闭关飞升。",
  "好浓烈的活人气息扑面而来——能把日子过得这么有声有色，是真本事。",
  // 预期违背 / 先抑后扬（脱口秀核心机制：假装要损你，转折落点却是夸）
  "我得正式批评你一下——优秀得这么不低调，让我们这些普通人很难做啊。",
  "你最大的缺点，就是让人实在想不出你还有别的缺点。",
  "我本来想挑你点毛病的，找了半天，放弃了。",
  "说出来你可能要生气——你好像，真没什么可挑的。",
  "我刚想张嘴说「就这？」，话到嘴边咽了回去——因为你是真行。",
  "本来准备了一肚子毒舌，结果一句都没用上，你赢了。"
];

/* 丧气/负面输入专用「温柔池」：累、想摆烂、搞砸、emo 等输入不该被浮夸彩虹屁顶回去。
   损中带宠、落点温柔，绝不上「联合国/李白/诺贝尔」式宏大背书（那会显得敷衍甚至像嘲讽）。 */
var NEG = [
  "累就对了——说明你今天是真的在拼命活，歇会儿，地球离了谁都照样转。",
  "能扛到现在还没原地解体，你这续航，我手机的电池看了都自卑。",
  "不想上班太正常了，这说明你心里清楚自己配得上更好的，这份清醒先给满分。",
  "高质量摆烂也是门手艺，你这躺平的姿势，专业选手看了都想偷师。",
  "搞砸了怕啥——敢上手才会砸，比那些光站着指点的人强一百倍。",
  "拖延是因为你潜意识知道那事没那么急，这份从容，多少人求都求不来。",
  "emo 就 emo 一会儿，情绪来了你接得住，比硬撑着装没事的人勇敢多了。",
  "压力大，说明你在乎、在扛事——会喊累的人，往往是最靠得住的那一个。",
  "今天啥也没干？那是你给这个内卷的世界，默默省下了一份多余的努力。",
  "你对自己已经够狠了，换成朋友这么拼，你早让人家歇了——也歇歇自己吧。",
  "丧不是你不行，是今天的电用完了，充上就好，别急着否定自己。",
  "你已经做得够多了，多到自己都没察觉，所以才会累成这样，知道吗。",
  "能把难受说出口，就已经赢一半了——憋着的人，才最容易内伤。",
  "今天先这样吧，不用赢，能活到现在，已经够本了。",
  // 嘴替体「你不是 X，你是 Y」：把丧气小事翻译成乐子（梗 > 夸，让人看了乐哈哈）
  "你不是懒，你是把「休息」这件事，卷到了别人够不着的境界。",
  "你不是没钱，你是钱包最近在做轻断食。",
  "你不是不想上班，你是太清醒，清醒地发现自己被低估了。",
  "你不是熬夜，你是舍不得让这么好的夜，浪费在睡觉上。",
  "你不是累，你是今天的电量，诚诚实实地走完了全程。",
  "你不是摆烂，你是在为下一次发力，做战略性蓄能。",
  "你不是emo，你是情绪比别人更新得勤快，属于活得真实。"
];

/* 场景/身份识别池（最对症层，优先级高于 TRIVIA 动作池）：
   识别用户输入里的「人物身份 / 处境场景」，剖开那一个点对症地夸 —— 夸独特不夸普遍。
   负面处境（被骂/焦虑/失恋…）不止安慰，还给「正向引导/reframe」：
   落塞利格曼乐观解释风格（坏事是暂时的、特定的、非你的错）、阿德勒课题分离（别人的评价是别人的课题）、
   成长型思维（夸过程努力不夸天赋结果）—— 但全说人话、走损友口吻，不说教不掉书袋。
   注意：负面场景的句子里绝不出现「联合国/李白/诺贝尔」式宏大背书（那对丧气的人显敷衍甚至像嘲讽）。 */
var SCENE = [

  "行了，在我这儿不用逞强——今天你已经够顶了，真的，我没夸张。",
  "你那些破事我都知道，可还是想说一句：有你这朋友，我值了。",
  "别跟自己死磕了，你又不是铁打的；今天到这儿就行，明天的事明天再说。",
  "我逗你归逗你，心里是真觉得——你这人，不赖。",
  "累就累了，不丢人。歇会儿，天塌下来还有个儿高的顶着，反正轮不到你。",
  "你比自己以为的，扛得住多了，这点我比你还清楚。",
  "今天的「做人指标」你早超额完成了，剩下的额度，留着明天再卷。",
  "你不用做到什么样我才向着你——你现在这样，就挺好。",
  "我嘴上损你，心里是服你的。今天这一关你又熬过来了，牛。",
  "别想太多，你做得已经够好了——这话从我嘴里说出来，你懂分量。",
  "撑不住就靠会儿，朋友是干嘛用的——轮到我顶的时候，我不躲。",
  "你今天能想起来夸夸自己，就已经赢过昨天那个硬扛的你了。",
  // 带 reframe 的几句：把"别人的评价/一时的失手/眼下的难"轻轻拨回原位（损友嘴说人话，不说教）
  "别人嘴里那个你，是他们自己脑补的版本，跟真的你没关系——你别拿那个版本难为自己。",
  "今天没做好不等于你不行，只是还没到那一下而已——急啥，你又不是只活今天。",
  "再难的事也有保质期，扛过今晚，明早它准缩水一大圈，信我。",
  "你半夜里偷偷使的那些劲儿，没人看见，但我知道——光这一点，就够你抬头挺胸的了。"
];
var WARMOPEN = ["","说真的，","偷偷跟你说，","我就直说，"];
var WARMTAIL = ["","",""," 🤍"];

function _pick(a){ return a[Math.floor(Math.random()*a.length)]; }

function _clean(s){
  s = (s||"").replace(/\s+/g," ").trim();
  s = s.replace(/[。.!！?？~～\s]+$/,"");           // 去掉句尾标点，接连接词更顺
  if(s.length > 40) s = s.slice(0,40) + "…";
  return s;
}

function _trivia(text){
  var t = (text||"").toLowerCase();
  for(var i=0;i<TRIVIA.length;i++){
    for(var j=0;j<TRIVIA[i].kws.length;j++){
      if(t.indexOf(TRIVIA[i].kws[j]) >= 0) return TRIVIA[i].line;
    }
  }
  return "";
}

/* 场景/身份识别：命中返回该场景的候选句数组（最对症），未命中返回 null。
   优先级高于 _trivia —— 处境/身份比"做了什么动作"更能定位该夸的那个点。 */
function _scene(text){
  var t = (text||"").toLowerCase();
  for(var i=0;i<SCENE.length;i++){
    for(var j=0;j<SCENE[i].kws.length;j++){
      if(t.indexOf(SCENE[i].kws[j]) >= 0) return SCENE[i].lines;
    }
  }
  return null;
}

function _seam(punch, tail){
  // tail 以标点开头时去掉 punch 末尾终止标点，避免「。。」「。，」「。！」
  if (/^[，。、！？!?]/.test(tail)) punch = punch.replace(/[。！？!?…]+$/, "");
  return punch + tail;
}

/* 丧气/负面输入检测：累、想摆烂、搞砸、emo、压力大、被打回 等——这类不该被浮夸彩虹屁顶回去，
   笑点改从 NEG 温柔池（损中带宠、落点暖），而非 ABSURD 的「联合国/李白」式宏大背书。 */
function _isNeg(text){
  return /累|乏了|懒|不想上班|不想上学|不想干|想辞职|想离职|摆烂|躺平|摸鱼|emo|焦虑|压力|好烦|烦死|丧|郁闷|难过|低落|没钱|穷|缺钱|搞砸|搞错|失败|做砸|办砸|又错|出错|拖延|又拖|没做完|拖到|啥也没|什么也没|一事无成|吵架|拌嘴|闹掰|被骂|被批|被怼|崩溃|撑不住|扛不住|熬不|又胖|减肥失败|没忍住|吃多了|熬夜|失眠|睡不着|打回|被拒|被否|没通过|被毙/.test((text||"").toLowerCase());
}

/* ⓪ 活人感层（最高优先）：不抽签，先"听懂"你这句话 —— 抓句式标记(才/又/还是/是不是)
   + 具体内容(数量/对象)，接住你的言外之意再回应；而不是认个关键词发通用罐头。
   这是去掉"程序感"的核心：输出真的在回应你说的话。命中返回接住句，未命中返回 ""（退回下面的场景/动作/通用层）。 */
var SOUL_OPEN = ["","","","","说真的，","我跟你讲，","听我一句，"];
var SOUL_SEEK = [   // 自我怀疑/求安慰（是不是很没用/值不值）→ 正面顶回
  "你心里其实有答案，只是想找个人替你确认一下——那我确认给你：不是，而且差得远。",
  "会这么问的人，恰恰是最在乎、最不该被这么问的那个。光这一问，就说明你够格。",
  "不止「不是」，你比自己以为的稳多了——这话我不哄人，你信我这一次。"
];
var SOUL_LOW_NUM = [   // 自贬 + 数量（才两页/才跑两圈）→ 接住那个数，反驳"才"
  "「才{x}」也值得记一笔——你是在跟昨天那个没动的自己比，不是跟谁比。",
  "才{x}？能开始的人，已经赢过一堆光说不做的了，别自己先把自己否了。"
];
var SOUL_LOW_OBJ = [   // 自贬 + 对象（好歹把饭做了）→ 接住那件事
  "你那个{x}，别说得跟没做一样——做了就是做了，赖不掉。",
  "{x}都搞了还嫌不够？你这不叫差，叫低估自己。"
];
var SOUL_LOW = [   // 自贬，无具体物
  "你又来了——做了还非把自己说得一文不值，这毛病改不掉，只能说明你真低估自己。",
  "「没干什么」是你的口头禅，可你心里清楚，光撑到现在就不容易了。"
];
var SOUL_BLAME = [   // 自责惯性（又熬夜/又拖了）→ 赦免那个"又"
  "会为这事自责，本身就说明你心里装着个更好的自己——真摆烂的人，可没空愧疚。",
  "别老揪着那个「又」字不放，你不是没长进，是对自己的标准高到自己都够不着。",
  "「又」一次而已，天没塌——你对自己够狠了，换成朋友这么拼，你早劝人家歇了。"
];
var SOUL_EFF_OBJ = [   // 坚持/转折 + 对象（累还是把方案交了）→ 夸那个"还是"，接住对象
  "你那个{x}，到底还是被你啃下来了——「累归累、事还得办完」，这劲儿装不出来。",
  "重点不是你搞定了{x}，是你明明能摆烂、却还是做了，这份跟自己较真，我服。"
];
var SOUL_EFF = [   // 坚持/转折，无对象
  "你明明可以不做、可以摆烂，但你还是做了——就这份跟自己较真，比啥都金贵。",
  "能熬到这步还没把自己交代出去，这股韧劲儿，比喊两句口号就跑的人实在太多。"
];
var SOUL_OBJ = [   // 无标记但说了具体的事（把厨房收拾了）→ 接住它
  "就冲你今天还顾得上{x}，我就知道你这人靠谱，塌不了。",
  "你那个{x}，处理得比自己以为的漂亮多了——别老不当回事。"
];
function _fill(pool, x){ return _pick(pool).replace(/\{x\}/g, x); }
/* 抽"我听见的那个具体东西"：数量词组(完整,防截断) + 把字句对象(取"的"后核心名词)。抓不准就留空。 */
function _echo(t){
  var qty = "个小时|个月|个星期|个礼拜|小时|分钟|公里|千米|公斤|道题|章节|个|页|遍|次|天|周|月|年|宿|夜|斤|步|道|题|封|章|节|杯|顿|趟|局|篇|盘|场|轮|米";
  var num = t.match(new RegExp("(?:\\d+|[一二两三四五六七八九十百千]+|半|好几|大半|一整)(?:" + qty + ")"));
  var ba  = t.match(/把(.{1,14}?)(交了|交|做完|做好|做|写完|写|改完|改|搞定|完成|收拾好|收拾|忙完|搞完|弄完|处理掉|处理|读完|看完|背完|跑完|洗完|洗|扔了|倒了|带完)/);
  var obj = ba ? ba[1] : "";
  if (obj) obj = obj.replace(/^.*的/, "").replace(/^(那个|这个|某个|一个|那|这)/, "").trim();
  return { num: num ? num[0] : "", obj: obj };
}
function _soul(text){
  var t = (text||"").trim();
  if (!t) return "";
  var e = _echo(t), num = e.num, obj = e.obj;
  var seek      = /是不是很?[没差笨蠢废烂]|是不是.{0,6}不行|算不算|值不值|有没有意义|有没有用|我是不是|正常吗|会不会太|配不配|配吗/.test(t);
  var selfLow   = /才[看做写跑学读背练睡走存]|只[看做写跑学读背了是]|不过.{0,5}(罢了|而已)|不过是|勉强|随便(弄|做|搞|写)|好歹|没干(什么|啥)|没做(什么|啥)|没什么大不了|不值一提|没什么用|不算什么/.test(t);
  var selfBlame = /又.{0,4}(熬夜|拖|emo|忘|没忍住|失眠|胖|犯|搞砸|迟到|玩手机|吃多)|老是|总是.{0,4}不|怎么又|没忍住|管不住|又一次|我又/.test(t);
  var effort    = /终于|总算|还是.{0,5}[了完出到]|到底.{0,4}[了完]|硬是|愣是|坚持|撑住|撑过|撑到|熬过|熬到|挺过|没放弃|逼(着)?自己/.test(t);
  var turn      = /虽然.{0,14}[但还可]|尽管.{0,14}[但还]|明明.{0,12}却|累.{0,8}还(是|得)?|忙.{0,8}还(是|得)?|困.{0,8}还(是|得)?|不想.{0,8}还是|不舒服.{0,8}还/.test(t);
  if (seek)          return _pick(SOUL_SEEK);
  if (selfLow)       return num ? _fill(SOUL_LOW_NUM, num) : (obj ? _fill(SOUL_LOW_OBJ, obj) : _pick(SOUL_LOW));
  if (selfBlame)     return _pick(SOUL_BLAME);
  if (effort || turn) return obj ? _fill(SOUL_EFF_OBJ, obj) : _pick(SOUL_EFF);
  // 弱兜底只认"把字句对象"：丧气让位给温柔池；纯数量不接(免得"喝了一杯水"被错接成"撑过一杯"——
  // 数量只在配了自贬/坚持标记时才接，见上面 SOUL_LOW_NUM)
  if (!_isNeg(t) && obj) return _fill(SOUL_OBJ, obj);
  return "";
}

/* 正面：先过活人感层（接住你的话）；接不住再走 ① 场景/身份 → ② 动作定制 → ③ 通用池。
   活人感命中时只配一个轻语气前缀、不套浮夸收尾——那句"接住"本身就是重点，套花活反而稀释。 */
function genFront(text, flavor){
  var key = FLAVOR[flavor] ? flavor : "chaos";
  var f = FLAVOR[key];
  var soul = _soul(text);
  if (soul) return _pick(SOUL_OPEN) + soul;    // ⓪ 接住言外之意/具体内容：最像真人，优先
  var sc = _scene(text);                        // ① 身份/处境
  var tl = _trivia(text);                       // ② 具体动作小事
  var punch;
  if (sc) {
    punch = _pick(sc);
  } else if (tl) {
    var pool = _isNeg(text) ? NEG : ABSURD;
    punch = Math.random() < 0.65 ? tl : _pick(pool);
  } else {
    punch = _pick(_isNeg(text) ? NEG : ABSURD);
  }
  return _pick(f.open) + _seam(punch, _pick(f.tail));
}

/* 背面：走心悄悄话。让暖句独立成句、像一句真心话，不串损友腔。 */
function genBack(text){
  return _pick(WARMOPEN) + _seam(_pick(WARM), _pick(WARMTAIL));
}

/* 称号：MBTI/抽卡式认证，随机抽一张（像换卡也换称号）。 */
function genTitle(){ return _pick(TITLES); }

/* 兼容旧入口：warmth 走背面，其它走正面 */
function generate(text, flavor){
  return flavor === "warmth" ? genBack(text) : genFront(text, flavor);
}

/* node 自测入口 */
if (typeof module !== "undefined" && module.exports){
  module.exports = {
    generate: generate, genFront: genFront, genBack: genBack, genTitle: genTitle,
    _trivia: _trivia, _scene: _scene, _soul: _soul, _echo: _echo, _clean: _clean, _isNeg: _isNeg,
    TRIVIA: TRIVIA, SCENE: SCENE, FLAVOR: FLAVOR, ABSURD: ABSURD, NEG: NEG, WARM: WARM, TITLES: TITLES
  };
}

/* ============================================================
   页面交互（仅浏览器执行）
   ============================================================ */
if (typeof document !== "undefined"){
  (function(){
    var inp=document.getElementById("inp"), go=document.getElementById("go"),
        cardwrap=document.getElementById("cardwrap"), flip=document.getElementById("flip"),
        kbody=document.getElementById("kbody"), bbody=document.getElementById("bbody"),
        kno=document.getElementById("kno"), ktitle=document.getElementById("ktitle"),
        row=document.getElementById("row"),
        again=document.getElementById("again"), copy=document.getElementById("copy"),
        save=document.getElementById("save"),
        tones=document.getElementById("tones"), chips=document.getElementById("chips"),
        toast=document.getElementById("toast");
    var tone="chaos", curFront="", curBack="", typer=null;

    var EXAMPLES=["我今天喝了一杯水","我准时起床了","我没有赖床","我把一整碗饭吃完了",
                  "我今天没迟到","我今天还活着","我今天好累","我不想上班"];
    EXAMPLES.forEach(function(ex){
      var c=document.createElement("div"); c.className="chip"; c.textContent=ex;
      c.addEventListener("click", function(){ inp.value=ex; praise(); });
      chips.appendChild(c);
    });

    function setToast(msg){
      toast.textContent=msg; toast.classList.add("show");
      setTimeout(function(){ toast.classList.remove("show"); }, 1600);
    }
    function randNo(){
      var n = 1 + Math.floor(Math.random()*9998);
      return "No." + ("0000"+n).slice(-4);
    }
    function typewrite(text){
      kbody.textContent="";
      if(typer) clearInterval(typer);
      var i=0;
      typer=setInterval(function(){
        kbody.textContent = text.slice(0, i+1); i++;
        if(i>=text.length){ clearInterval(typer); typer=null; }
      }, 26);
    }
    function praise(){
      var t = inp.value||"";
      curFront = genFront(t, tone);
      curBack  = genBack(t);
      kno.textContent = randNo();
      ktitle.textContent = genTitle();
      bbody.textContent = curBack;
      flip.classList.remove("flipped");   // 每张都从正面开始
      cardwrap.classList.add("show");
      row.classList.add("show");
      typewrite(curFront);
    }
    // 轻点卡片翻面（正↔背）
    flip.addEventListener("click", function(){ flip.classList.toggle("flipped"); });

    go.addEventListener("click", praise);
    again.addEventListener("click", praise);
    copy.addEventListener("click", function(){
      if(!curFront) return;
      var full = "🏆 夸夸卡｜" + ktitle.textContent + "\n" + curFront +
                 "\n\n🤍 " + curBack + "\n—— 宇宙夸夸协会 荣誉认证";
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(full).then(
          function(){ setToast("已复制 ✓ 去发给朋友吧"); },
          function(){ setToast("复制失败，截图也行"); });
      } else { setToast("长按卡片文字可手动复制"); }
    });

    // 纯 canvas 自画正面卡片导出 PNG（零依赖，保持单机），含「今日认证称号」
    function drawCard(front, title, noStr){
      var W=660, pad=44, lh=44, headH=58, titleH=58, footH=80;
      var cvs=document.createElement("canvas"), ctx=cvs.getContext("2d");
      var bodyFont='600 30px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.font=bodyFont;
      var maxW=W-pad*2, lines=[], paras=String(front).split("\n");
      paras.forEach(function(p){
        var cur="", chars=Array.from(p);
        for(var i=0;i<chars.length;i++){
          var t=cur+chars[i];
          if(ctx.measureText(t).width>maxW && cur){ lines.push(cur); cur=chars[i]; }
          else cur=t;
        }
        lines.push(cur); lines.push("");
      });
      if(lines.length) lines.pop();
      var H=pad+headH+titleH+lines.length*lh+footH, s=2;
      cvs.width=W*s; cvs.height=H*s; ctx.scale(s,s);
      var g=ctx.createLinearGradient(0,0,W,H);
      g.addColorStop(0,"#fffdf7"); g.addColorStop(.6,"#fff2f7"); g.addColorStop(1,"#f1ecff");
      ctx.fillStyle=g;
      if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(0,0,W,H,28); ctx.fill(); } else ctx.fillRect(0,0,W,H);
      ctx.textBaseline="top";
      // header
      ctx.font='700 26px "PingFang SC",sans-serif'; ctx.fillStyle="#e8a52f";
      ctx.fillText("🏆 夸夸卡",pad,pad);
      ctx.font='600 20px "PingFang SC",sans-serif'; ctx.fillStyle="#caa64a";
      ctx.textAlign="right"; ctx.fillText(noStr||"",W-pad,pad+4); ctx.textAlign="left";
      // 称号 badge（圆角底 + 文字）
      var ty=pad+headH;
      ctx.font='700 22px "PingFang SC",sans-serif';
      var tw=ctx.measureText(title||"").width, bw=tw+34, bh=38;
      ctx.fillStyle="#ffe2c0";
      if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(pad,ty,bw,bh,19); ctx.fill(); } else ctx.fillRect(pad,ty,bw,bh);
      ctx.fillStyle="#a8530a"; ctx.fillText(title||"",pad+17,ty+8);
      // body
      ctx.font=bodyFont; ctx.fillStyle="#3a3346";
      var y=pad+headH+titleH;
      lines.forEach(function(ln){ ctx.fillText(ln,pad,y); y+=lh; });
      ctx.font='64px serif'; ctx.globalAlpha=.15; ctx.fillText("🌈",W-pad-66,H-footH-2); ctx.globalAlpha=1;
      ctx.font='italic 20px "PingFang SC",sans-serif'; ctx.fillStyle="#b9a6cf";
      ctx.textAlign="right"; ctx.fillText("—— 宇宙夸夸协会 荣誉认证",W-pad,H-36); ctx.textAlign="left";
      return cvs;
    }
    save.addEventListener("click", function(){
      if(!curFront) return;
      try{
        var url=drawCard(curFront, ktitle.textContent, kno.textContent).toDataURL("image/png");
        var a=document.createElement("a"); a.href=url; a.download="夸夸卡.png";
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setToast("图片已生成 ✓ 没弹下载就长按图片保存");
      }catch(err){ setToast("生成失败，直接截图也行"); }
    });

    tones.addEventListener("click", function(e){
      var el=e.target.closest(".tone"); if(!el) return;
      tone=el.getAttribute("data-tone");
      var all=tones.querySelectorAll(".tone");
      for(var k=0;k<all.length;k++) all[k].classList.remove("active");
      el.classList.add("active");
      if(curFront) praise();
    });
    inp.addEventListener("keydown", function(e){
      if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); praise(); }
    });
  })();
}
</script>
