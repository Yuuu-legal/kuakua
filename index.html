<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夸夸卡 · 多小的事我都能离谱地夸你</title>
<style>
  :root{
    --bg1:#ffe9f0; --bg2:#e9f2ff; --bg3:#fff6e6;
    --card:#ffffff; --ink:#2b2b3a; --soft:#9a9ab0;
    --accent:#ff6f9c; --accent2:#7c6cff; --gold:#f6b73c;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--ink);min-height:100vh;
    background:linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg3));
    background-attachment:fixed;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .wrap{width:100%;max-width:460px;}
  .head{text-align:center;margin-bottom:16px;}
  .head h1{font-size:30px;margin:0 0 4px;letter-spacing:1px;}
  .head p{margin:0;color:var(--soft);font-size:14px;line-height:1.5;}
  .panel{background:var(--card);border-radius:22px;padding:18px;box-shadow:0 18px 50px rgba(120,108,255,.16);}
  textarea{
    width:100%;border:1.5px solid #eee;border-radius:16px;padding:14px;
    font-size:16px;font-family:inherit;color:var(--ink);resize:none;height:64px;
    outline:none;transition:border .2s;background:#fafaff;
  }
  textarea:focus{border-color:var(--accent2);}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:12px 0 4px;}
  .chip{
    font-size:12.5px;padding:6px 11px;border-radius:30px;background:#f3f0ff;
    color:var(--accent2);cursor:pointer;border:1px solid #ece8ff;transition:transform .08s;
  }
  .chip:active{transform:scale(.95);}
  .tip{font-size:12px;color:var(--soft);margin:10px 2px 6px;}
  .tones{display:flex;gap:7px;margin:6px 0 12px;}
  .tone{
    flex:1;text-align:center;padding:9px 0;border-radius:12px;font-size:12.5px;
    border:1.5px solid #eee;background:#fafaff;color:var(--soft);cursor:pointer;
    transition:all .15s;user-select:none;
  }
  .tone.active{border-color:var(--accent);background:#fff0f5;color:var(--accent);font-weight:600;}
  .go{
    width:100%;border:none;border-radius:16px;padding:15px;font-size:17px;font-weight:700;
    color:#fff;background:linear-gradient(120deg,var(--accent),var(--accent2));cursor:pointer;
    box-shadow:0 10px 24px rgba(255,111,156,.35);transition:transform .08s;
  }

  .kcard{
    display:none;margin-top:18px;border-radius:20px;padding:22px 20px 18px;
    background:linear-gradient(160deg,#fffdf7,#fff2f7 60%,#f1ecff);
    border:1.5px solid #ffe2c2;box-shadow:0 14px 36px rgba(246,183,60,.18);position:relative;
  }
  .kcard.show{display:block;animation:pop .28s ease;}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98);}to{opacity:1;transform:none;}}
  .kcard .ktop{display:flex;align-items:center;justify-content:space-between;
    font-size:13px;color:var(--gold);font-weight:700;letter-spacing:.5px;margin-bottom:12px;}
  .kcard .kno{color:#caa64a;font-weight:600;font-size:12px;}
  .kcard .kbody{font-size:18.5px;line-height:1.75;white-space:pre-wrap;min-height:54px;color:#3a3346;}
  .kcard .kfoot{margin-top:14px;text-align:right;font-size:12px;color:#b9a6cf;font-style:italic;}
  .kcard .kseal{position:absolute;right:16px;bottom:38px;font-size:30px;opacity:.18;transform:rotate(-12deg);}

  .row{display:none;gap:8px;margin-top:12px;}
  .row.show{display:flex;}
  .mini{
    flex:1;border:1.5px solid #eee;background:#fff;border-radius:12px;padding:11px 0;
    font-size:14px;color:var(--ink);cursor:pointer;text-align:center;transition:transform .08s;
  }

  .mini.primary{border-color:var(--accent2);color:var(--accent2);font-weight:600;}
  .foot{text-align:center;color:var(--soft);font-size:12px;margin-top:16px;line-height:1.6;}
  .toast{
    position:fixed;left:50%;bottom:36px;transform:translateX(-50%) translateY(20px);
    background:#2b2b3a;color:#fff;padding:10px 18px;border-radius:30px;font-size:14px;
    opacity:0;transition:all .25s;pointer-events:none;z-index:9;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>夸夸卡 🏆</h1>
      <p>说件今天的小事，越鸡毛蒜皮越好——<br>我用最离谱的逻辑，把它夸成惊天动地。</p>
    </div>
    <div class="panel">
      <textarea id="inp" placeholder="比如：我今天喝了一杯水…"></textarea>
      <div class="tip">懒得想？点一个试试 ↓</div>
      <div class="chips" id="chips"></div>
      <div class="tones" id="tones">
        <div class="tone" data-tone="deadpan">😐 一本正经</div>
        <div class="tone" data-tone="hype">🚀 彩虹屁</div>
        <div class="tone active" data-tone="chaos">🤡 离谱发癫</div>
      </div>
      <button class="go" id="go">给我发张夸夸卡</button>

      <div class="kcard" id="kcard">
        <div class="ktop"><span>🏆 夸夸卡</span><span class="kno" id="kno">No.0000</span></div>
        <div class="kbody" id="kbody"></div>
        <div class="kseal">🌈</div>
        <div class="kfoot">—— 宇宙夸夸协会 荣誉认证</div>
      </div>
      <div class="row" id="row">
        <div class="mini primary" id="again">🔁 换一张</div>
        <div class="mini" id="save">💾 存图</div>
        <div class="mini" id="copy">📋 复制</div>
      </div>
    </div>
    <div class="foot">
      纯本地运行 · 不联网 · 不存任何数据<br>
      截张图，发给那个今天也需要被夸一下的朋友 →
    </div>
  </div>
  <div class="toast" id="toast"></div>

<script>
/* ============================================================

   卖点：夸得毫无逻辑、不成比例、一本正经地胡说八道
   ============================================================ */

/* 主语与笑点之间的连接（多数用「？」），保持一句话 */
var CONN = ["？","？","？","——","，"];

/* 通用荒诞 punch：每条自成一句完整笑点，混多种梗机制（错位权威/伪数据/吉尼斯申遗/

var ABSURD = [
  // 错位权威背书

  // 押韵顺口
  "人见人夸，花见花开，连 wifi 见了你都想自动连上。",

  "经研究决定：今天的优秀代表就是你，没有悬念。",

  "你身上这股子靠谱劲儿，浓度高到能拿去当药引子。",

  "这操作丝滑得，德芙看了都想连夜改行。",

  "别人干这事叫完成任务，你干这事叫艺术。",
  "你要再优秀一点，我都不好意思跟你称兄道弟了。",

  "我损你归损你，这事我是真服，绝没拍马屁。",
  // 当下网络爆梗（2025 流行语 + 小红书体：自然、易传播）

  "这事谁都能干，但干出这股「活人感」的，全网没剩几个。",

];

/* 刁钻定制：超常见的鸡毛蒜皮小事，命中就用更精准的离谱夸（替换升格层）。
   注意顺序：更具体/更长的关键词在前，避免被宽泛词抢先命中。 */
var TRIVIA = [
  { kws:["喝水","喝了水","一杯水","喝水了","多喝水","喝口水","喝热水"],
    line:"你居然准确地知道，水是用来喝的、而不是用来呼吸的——光这一条物种基础认知，就甩开了百分之九十九的鱼。" },
  { kws:["没赖床","不赖床","没有赖床"],

  { kws:["起床","起了床","醒了","爬起来"],
    line:"你今天同时战胜了地球引力和被窝的双重封印，成功起床——这是只有勇者才打得过的隐藏副本。" },
  { kws:["早睡","早点睡","没熬夜","按时睡"],
    line:"你今天打算早睡——在全民熬夜的时代，这种反潮流壮举，你的生物钟激动到当场痛哭流涕。" },
  { kws:["吃水果","水果","吃了苹果","吃青菜","吃菜"],
    line:"你主动向维生素伸出了手——在炸鸡奶茶的重重围剿下还记得吃口水果，你的免疫系统激动得连夜放了烟花。" },
  { kws:["做饭","做了饭","自己做饭","下厨","煮饭"],
    line:"你居然自己做了饭，从买菜到出锅一条龙，这种荒野求生级的生存能力，贝爷看了都想拜师。" },
  { kws:["没点外卖","自己带饭","带了饭"],
    line:"你拒绝了外卖的诱惑、自食其力喂饱了自己，这份自律，连你的钱包都流下了感动的泪水。" },
  { kws:["吃饭","吃完","吃了饭","干饭","吃饱","早饭","午饭","晚饭"],
    line:"你把一整碗饭精准地送进了胃里，零失误、零掉落，米其林评审看了感动到想哭。" },
  { kws:["没迟到","准时到","按时","没有迟到","早到"],

  { kws:["回消息","回了消息","回复","秒回","回了个"],
    line:"你及时回复了消息——在这个已读不回横行的年代，你简直是数字文明最后的良心。" },
  { kws:["走路","散步","走了走","遛弯","迈了腿","走了几步"],
    line:"你用两条腿成功移动了身体，完美复刻了人类百万年进化的精华，直立行走的代言人非你莫属。" },
  { kws:["呼吸","活着","还活着","喘气","没死","喘口气"],
    line:"你今天一整天持续呼吸、一次都没忘——这种敬业精神，连你的肺都感动得想给你写感谢信。" },
  { kws:["洗澡","洗头","刷牙","洗脸","洗漱"],
    line:"你主动把自己收拾得干干净净，香气直冲云霄，方圆三里的空气都因此升了一个档次。" },
  { kws:["叠被子","收拾房间","整理","归置"],
    line:"你不仅起了床，还反手收拾了「犯罪现场」，这种善后能力，刑侦队都想请你去喝杯茶。" },

  { kws:["喂猫","喂狗","铲屎","浇花"],
    line:"你照顾了一条小生命，它今天的幸福指数因你飙升，动物保护组织想颁你一座「年度铲屎官」。" },

var FLAVOR = {
  deadpan:{   // 一本正经的损友
    open:["","","我跟你讲，","不是我说，","说真的，","听我一句，"],
    tail:["","","。这话我只说一遍。","。爱信不信，反正是真的。","。咱俩谁跟谁。"]
  },
  hype:{      // 夸上天的损友
    open:["","哥们儿！","老铁啊——","我的宝，","家人们谁懂啊，","啊这是哪来的神仙——"],
    tail:["！","！！！","，别人都是弟弟！","，这杯我敬你🍻","，走起！"]
  },
  chaos:{     // 发癫损友
    open:["","就你这样的——","不是哥们，","退退退，给我兄弟让道——","我谢谢你啊，","绷不住了家人们——"],
    tail:["","，咱俩谁跟谁🤡","。回头请你喝酒。","。够意思吧？","。我直接给你跪了。"]
  }
};

function _pick(a){ return a[Math.floor(Math.random()*a.length)]; }

function _clean(s){
  s = (s||"").replace(/\s+/g," ").trim();
  s = s.replace(/[。.!！?？~～\s]+$/,"");           // 去掉句尾标点，接连接词更顺
  if(s.length > 40) s = s.slice(0,40) + "…";
  return s;
}

function _trivia(text){
  var t = (text||"").toLowerCase();
  for(var i=0;i<TRIVIA.length;i++){
    for(var j=0;j<TRIVIA[i].kws.length;j++){
      if(t.indexOf(TRIVIA[i].kws[j]) >= 0) return TRIVIA[i].line;
    }
  }
  return "";
}

function generate(text, flavor){
  // 一句话：[轻开场]「你的小事」[连接] 一个笑点 [轻收尾]。
  // 砍掉固定 pivot/权威/收尾的多段堆叠——那是“重复又太多”的根源。
  var key = FLAVOR[flavor] ? flavor : "chaos";
  var f = FLAVOR[key];
  var raw = _clean(text);
  var subj = raw ? ("「" + raw + "」") : "你今天的存在本身";
  var tl = _trivia(text);
  // 命中定制时 ~60% 用精准段子、~40% 串通用荒诞，避免“换一张”老是同一句
  var punch = tl ? (Math.random() < 0.6 ? tl : _pick(ABSURD)) : _pick(ABSURD);
  var tail = _pick(f.tail);
  // 接缝：punch 多以「。」收尾，tail 又以标点开头 → 去掉 punch 末尾终止标点，避免「。。」「。，」
  if (/^[，。、！？!?]/.test(tail)) punch = punch.replace(/[。！？!?…]+$/, "");
  return _pick(f.open) + subj + _pick(CONN) + punch + tail;
}

/* node 自测入口 */
if (typeof module !== "undefined" && module.exports){
  module.exports = { generate: generate, _trivia: _trivia, _clean: _clean, TRIVIA: TRIVIA, FLAVOR: FLAVOR, ABSURD: ABSURD };
}

/* ============================================================
   页面交互（仅浏览器执行）
   ============================================================ */
if (typeof document !== "undefined"){
  (function(){
    var inp=document.getElementById("inp"), go=document.getElementById("go"),
        kcard=document.getElementById("kcard"), kbody=document.getElementById("kbody"),
        kno=document.getElementById("kno"), row=document.getElementById("row"),
        again=document.getElementById("again"), copy=document.getElementById("copy"),
        save=document.getElementById("save"),
        tones=document.getElementById("tones"), chips=document.getElementById("chips"),
        toast=document.getElementById("toast");
    var tone="chaos", cur="", typer=null;

    var EXAMPLES=["我今天喝了一杯水","我准时起床了","我没有赖床","我把一整碗饭吃完了",
                  "我今天没迟到","我回了一条消息","我出门走了走","我今天还活着"];
    EXAMPLES.forEach(function(ex){
      var c=document.createElement("div"); c.className="chip"; c.textContent=ex;
      c.addEventListener("click", function(){ inp.value=ex; praise(); });
      chips.appendChild(c);
    });

    function setToast(msg){
      toast.textContent=msg; toast.classList.add("show");
      setTimeout(function(){ toast.classList.remove("show"); }, 1600);
    }
    function randNo(){
      var n = 1 + Math.floor(Math.random()*9998);
      return "No." + ("0000"+n).slice(-4);
    }
    function typewrite(text){
      cur=text; kcard.classList.add("show"); kbody.textContent="";
      kno.textContent=randNo();
      if(typer) clearInterval(typer);
      var i=0;
      typer=setInterval(function(){
        kbody.textContent = text.slice(0, i+1); i++;
        if(i>=text.length){ clearInterval(typer); typer=null; }
      }, 26);
    }
    function praise(){
      typewrite(generate(inp.value||"", tone));
      row.classList.add("show");
    }
    go.addEventListener("click", praise);
    again.addEventListener("click", praise);
    copy.addEventListener("click", function(){
      if(!cur) return;
      var full = "🏆 夸夸卡\n" + cur + "\n—— 宇宙夸夸协会 荣誉认证";
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(full).then(
          function(){ setToast("已复制 ✓ 去发给朋友吧"); },
          function(){ setToast("复制失败，截图也行"); });
      } else { setToast("长按卡片文字可手动复制"); }
    });

    // 纯 canvas 自画卡片导出 PNG（零依赖，保持单机）
    function drawCard(text, noStr){
      var W=660, pad=44, lh=44, headH=72, footH=82;
      var cvs=document.createElement("canvas"), ctx=cvs.getContext("2d");
      var bodyFont='600 30px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.font=bodyFont;
      var maxW=W-pad*2, lines=[], paras=text.split("\n");
      paras.forEach(function(p){
        var cur="", chars=Array.from(p);
        for(var i=0;i<chars.length;i++){
          var t=cur+chars[i];
          if(ctx.measureText(t).width>maxW && cur){ lines.push(cur); cur=chars[i]; }
          else cur=t;
        }
        lines.push(cur); lines.push("");
      });
      if(lines.length) lines.pop();
      var H=pad+headH+lines.length*lh+footH, s=2;
      cvs.width=W*s; cvs.height=H*s; ctx.scale(s,s);
      var g=ctx.createLinearGradient(0,0,W,H);
      g.addColorStop(0,"#fffdf7"); g.addColorStop(.6,"#fff2f7"); g.addColorStop(1,"#f1ecff");
      ctx.fillStyle=g;
      if(ctx.roundRect){ ctx.beginPath(); ctx.roundRect(0,0,W,H,28); ctx.fill(); } else ctx.fillRect(0,0,W,H);
      ctx.textBaseline="top";
      ctx.font='700 26px "PingFang SC",sans-serif'; ctx.fillStyle="#e8a52f";
      ctx.fillText("🏆 夸夸卡",pad,pad);
      ctx.font='600 20px "PingFang SC",sans-serif'; ctx.fillStyle="#caa64a";
      ctx.textAlign="right"; ctx.fillText(noStr||"",W-pad,pad+4); ctx.textAlign="left";
      ctx.font=bodyFont; ctx.fillStyle="#3a3346";
      var y=pad+headH;
      lines.forEach(function(ln){ ctx.fillText(ln,pad,y); y+=lh; });
      ctx.font='64px serif'; ctx.globalAlpha=.15; ctx.fillText("🌈",W-pad-66,H-footH-8); ctx.globalAlpha=1;
      ctx.font='italic 20px "PingFang SC",sans-serif'; ctx.fillStyle="#b9a6cf";
      ctx.textAlign="right"; ctx.fillText("—— 宇宙夸夸协会 荣誉认证",W-pad,H-36); ctx.textAlign="left";
      return cvs;
    }
    save.addEventListener("click", function(){
      if(!cur) return;
      try{
        var url=drawCard(cur, kno.textContent).toDataURL("image/png");
        var a=document.createElement("a"); a.href=url; a.download="夸夸卡.png";
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        setToast("图片已生成 ✓ 没弹下载就长按图片保存");
      }catch(err){ setToast("生成失败，直接截图也行"); }
    });

    tones.addEventListener("click", function(e){
      var el=e.target.closest(".tone"); if(!el) return;
      tone=el.getAttribute("data-tone");
      var all=tones.querySelectorAll(".tone");
      for(var k=0;k<all.length;k++) all[k].classList.remove("active");
      el.classList.add("active");
      if(cur) praise();
    });
    inp.addEventListener("keydown", function(e){
      if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); praise(); }
    });
  })();
}
</script>
